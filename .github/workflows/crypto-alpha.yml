name: Crypto Alpha Engine v0.7.3

on:
  workflow_dispatch:
  schedule:
    # Hourly run keeps 1h/4h performance windows meaningful.
    - cron: "0 * * * *"

permissions:
  contents: read

env:
  SAFE_MODE: "true"
  RUN_MODE: "full"
  DATABASE_PATH: "outputs/crypto_alpha.db"
  PERSISTENT_STORAGE_MODE: "github_cache"
  SCORING_PROFILE: "balanced"
  DRY_RUN_VERBOSE: "false"
  DIGEST_MODE: "daily"
  DIGEST_HOUR_UTC: "18"
  DIGEST_MIN_INTERVAL_HOURS: "20"
  TELEGRAM_TEST_ON_RUN: "true"

jobs:
  scan:
    runs-on: ubuntu-latest
    concurrency:
      group: crypto-alpha-engine
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore persistent database cache
        uses: actions/cache@v4
        with:
          path: outputs/crypto_alpha.db
          key: crypto-alpha-db-${{ github.ref_name }}-${{ github.run_number }}
          restore-keys: |
            crypto-alpha-db-${{ github.ref_name }}-
            crypto-alpha-db-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare outputs directory
        run: mkdir -p outputs

      - name: Test Telegram connection
        if: env.TELEGRAM_TEST_ON_RUN == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: python tools/test_telegram.py

      - name: Run Crypto Alpha Engine
        env:
          SAFE_MODE: "true"
          RUN_MODE: "full"
          DATABASE_PATH: "outputs/crypto_alpha.db"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SEND_TELEGRAM_SUMMARY: "true"
          SEND_TELEGRAM_ALERTS: "true"
          SEND_TELEGRAM_DAILY_DIGEST: "true"
          SCORING_PROFILE: "balanced"
          DRY_RUN_VERBOSE: "false"
          DIGEST_MODE: "daily"
          DIGEST_HOUR_UTC: "18"
          DIGEST_MIN_INTERVAL_HOURS: "20"
          GITHUB_RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: python main.py

      - name: Upload reports and database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-alpha-reports-${{ github.run_id }}
          path: outputs/
          retention-days: 14
